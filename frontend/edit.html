<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modifier - SafeHaven</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    :root {
    --primary: #8b2ff5;
    --base-bg: #0a0a0c;
    --base-surface: #121217;
    --border-subtle: rgba(255, 255, 255, 0.08);
    --text-main: #ffffff;
    --text-muted: #8a8a93;
}

main.container {
    background-color: var(--base-bg);
    color: var(--text-main);
}

.stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem;
    margin-bottom: 3rem;
}

.stat {
    background: var(--base-surface);
    border: 1px solid var(--border-subtle);
    padding: 2rem;
    border-radius: 0;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
}

.stat h3 {
    color: var(--text-muted);
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin: 0;
}

.stat span {
    font-size: 2.5rem;
    font-weight: 800;
    color: var(--primary);
}

#editForm {
    background: var(--base-surface);
    border: 1px solid var(--border-subtle);
    padding: 3rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
    border-radius: 0;
}

#editForm h2 {
    grid-column: span 2;
    border-left: 4px solid var(--primary);
    padding-left: 1rem;
    color: var(--text-main);
}

.field-group label {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-transform: uppercase;
}

#editForm input, 
#editForm select {
    background: #1a1a21;
    border: 1px solid var(--border-subtle);
    color: var(--text-main);
    height: 50px;
    border-radius: 0;
}

#editForm input:focus {
    outline: none;
    border-color: var(--primary);
}

#editForm button[type="submit"] {
    grid-column: span 2;
    background: var(--primary);
    color: white;
    border: none;
    height: 55px;
    font-weight: 800;
    text-transform: uppercase;
    border-radius: 0;
}

@media (max-width: 768px) {
    #editForm, .stats {
        grid-template-columns: 1fr;
    }
}
  </style>
</head>
<body>

  <header class="navbar">
    <div class="container navbar-inner">
      <a class="logo" href="index.html" aria-label="Accueil SafeHaven">SafeHaven</a>

      <button class="menu-btn" type="button" aria-controls="primary-navigation" aria-expanded="false" aria-label="Ouvrir le menu">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="nav" id="primary-navigation" aria-label="Menu principal">
        <a class="nav-link active" href="index.html" aria-current="page">Accueil</a>
        <a class="nav-link" href="signalements.html">Signalements</a>
        <a class="nav-link" href="contac.html">Contact</a>
        <button class="nav-secondary" id="logoutBtn" type="button">Déconnexion</button>
        <a class="nav-link" href="profile.html">Profil</a>
        <a class="nav-primary add-disaster-toggle" href="index.html#add-disaster">Ajouter un signalement</a>
      </nav>
    </div>
  </header>

  <main class="container">
<form id="editForm">
  <br> <br>

  <h2>Modifier le signalement</h2>

  <div class="field-group full-width">
    <label>Titre</label>
    <input type="text" name="title">
  </div>

  <div class="field-group">
    <label>Zone</label>
    <select name="description" id="citySelect"></select>
  </div>

  <div class="field-group">
    <label>Date</label>
    <input type="date" name="date">
  </div>

  <div class="field-group">
    <label>Latitude</label>
    <input type="number" name="latitude">
  </div>

  <div class="field-group">
    <label>Longitude</label>
    <input type="number" name="longitude">
  </div>

  <div class="field-group">
    <label>Sévérité</label>
    <select name="severity">
      <option value="low">Low</option>
      <option value="medium">Medium</option>
      <option value="high">High</option>
    </select>
  </div>

  <div class="field-group">
    <label>Status</label>
    <select name="status">
  <option value="critical">Critique</option>
  <option value="high">Élevée</option>
  <option value="progress">En cours</option>
</select>
  </div>

  <div class="field-group">
    <label>Type</label>
<select name="type_id" id="typeSelect"></select>  </div>

  <div class="field-group">
    <label>Victimes</label>
    <input type="number" name="victims">
  </div>

  <div class="field-group">
    <label>Blessés</label>
    <input type="number" name="injured">
  </div>

  <div class="field-group full-width">
    <label>Dégâts (DH)</label>
    <input type="number" name="damage">
  </div>

  <button type="submit">Enregistrer</button>

</form>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <h2>SafeHaven</h2>
        <p>Un espace simple pour suivre les catastrophes.</p>
      </div>
      <div class="footer-links">
        <h3>Liens rapides</h3>
        <a href="index.html">Accueil</a>
        <a href="signalements.html">Signalements</a>
      </div>
    </div>
    <div class="container footer-bottom">
      <span>2026 SafeHaven</span>
    </div>
  </footer>

  <script src="js/edit.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
