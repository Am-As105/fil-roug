<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SafeHaven</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    main.container {
      padding: 80px 10%;
      background-color: #f4f5f9;
      min-height: calc(100vh - 400px);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .auth-card {
      background: #ffffff;
      border: 1px solid #d1d6e6;
      border-radius: 2px;
      width: 100%;
      max-width: 450px;
      padding: 40px;
    }

    .auth-card h2 {
      font-size: 24px;
      font-weight: 700;
      color: #121c2d;
      margin-bottom: 30px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group label {
      font-size: 13px;
      font-weight: 700;
      color: #606b85;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input {
      height: 48px;
      padding: 0 16px;
      border: 1px solid #d1d6e6;
      border-radius: 2px;
      font-size: 14px;
      color: #121c2d;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #001489;
      box-shadow: 0 0 0 2px rgba(0, 20, 137, 0.1);
    }

    .auth-btn {
      width: 100%;
      height: 48px;
      background-color: #f22f46;
      color: #ffffff;
      border: none;
      border-radius: 2px;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      margin-top: 10px;
    }

    .auth-footer {
      margin-top: 25px;
      text-align: center;
      font-size: 14px;
      color: #606b85;
    }

    .auth-footer a {
      color: #001489;
      text-decoration: none;
      font-weight: 600;
    }

    @media (max-width: 600px) {
      main.container { padding: 40px 20px; }
      .auth-card { padding: 25px; }
    }
  </style>
</head>
<body>

  <header class="navbar">
    <div class="container navbar-inner">
      <a class="logo" href="index.html">
        <span class="logo-mark">S</span>
        <span class="logo-text">
          <strong>SafeHaven</strong>
          <small>Protection et réponse</small>
        </span>
      </a>

      <button class="menu-btn" type="button">
        <span></span>
        <span></span>
        <span></span>
      </button>

        <nav class="nav" id="primary-navigation" aria-label="Menu principal">
        <a class="nav-link active" href="index.html" aria-current="page">Accueil</a>
        <a class="nav-link" href="signalements.html">Signalements</a>
        <a class="nav-link" href="contac.html">Contact</a>
        <button  style="color: violet;" class="nav-secondary" id="logoutBtn" type="button">Logout</button>
        <a  class="nav-link" href="profile.html">  Profile </a>
        <a class="nav-primary add-disaster-toggle" href="#add-disaster">Ajouter un signalement</a>
      </nav>
    </div>
  </header>

  <div  style="margin-top: 100px;"> </div>
   <div class="table-wrap">
        <div id="cards-container" class="cards"></div>
      </div>

    

  <footer class="footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <h2>SafeHaven</h2>
        <p>Un espace simple pour suivre les catastrophes.</p>
      </div>

      <div class="footer-links">
        <h3>Liens rapides</h3>
        <a href="index.html">Accueil</a>
        <a href="signalements.html">Signalements</a>
      </div>

      <div class="footer-contact">
        <h3>Contact</h3>
        <p>contact@safehaven.ma</p>
      </div>
    </div>

    <div class="container footer-bottom">
      <span>2026 SafeHaven</span>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
