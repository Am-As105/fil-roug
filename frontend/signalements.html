<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signalements - SafeHaven</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="navbar">
    <div class="container navbar-inner">
      <a class="logo" href="index.html" aria-label="Accueil SafeHaven">SafeHaven</a>

      <button class="menu-btn" type="button" aria-controls="primary-navigation" aria-expanded="false" aria-label="Ouvrir le menu">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="nav" id="primary-navigation" aria-label="Menu principal">
        <a class="nav-link" href="index.html">Accueil</a>
        <a class="nav-link active" href="signalements.html" aria-current="page">Signalements</a>
        <a class="nav-link" href="contac.html">Contact</a>
        <button class="nav-secondary" id="logoutBtn" type="button">Déconnexion</button>
        <a class="nav-link" href="profile.html">Profil</a>
        <a class="nav-primary add-disaster-toggle" href="index.html#add-disaster">Ajouter un signalement</a>
      </nav>
    </div>
  </header>

   <br><br><br> 

  <main class="container records-page">
    <section class="records-section">
      <div class="disasters-head">
        <h1>Registre des signalements</h1>
        <span id="recordsCount">0 entrées</span>
      </div>

     

      <div class="disasters-tools">
        <input type="text" placeholder="Rechercher par titre, zone ou date..." class="search">
        <select class="filter">
          <option value="all">Toutes les situations</option>
          <option value="critical">Critiques</option>
          <option value="progress">En cours</option>
          <option value="high">Élevées</option>
        </select>
      </div>

      <div class="cards-wrap">
        <div id="cards-container" class="cards"></div>
        <p id="recordsEmpty" class="empty-state hidden" aria-live="polite"></p>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <h2>SafeHaven</h2>
        <p>Un espace simple pour suivre les catastrophes.</p>
      </div>

      <div class="footer-links">
        <h3>Liens rapides</h3>
        <a href="index.html">Accueil</a>
        <a href="services.html">Services</a>
      </div>

      <div class="footer-contact">
        <h3>Contact</h3>
        <p>contact@safehaven.ma</p>
      </div>
    </div>

    <div class="container footer-bottom">
      <span>2026 SafeHaven</span>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
