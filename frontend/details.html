<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Détails catastrophe - SafeHaven</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/details.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>

  <header class="navbar">
    <div class="container navbar-inner">
      <a class="logo" href="index.html">
        <span class="logo-mark">S</span>
        <span class="logo-text">
          <strong>afeHaven</strong>
        </span>
      </a>

      <button class="menu-btn" type="button">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="nav" id="primary-navigation" aria-label="Menu principal">
        <a class="nav-link active" href="index.html" aria-current="page">Accueil</a>
        <a class="nav-link" href="signalements.html">Signalements</a>
        <a class="nav-link" href="contac.html">Contact</a>
        <button class="nav-secondary" id="logoutBtn" type="button">Logout</button>
        <a class="nav-link" href="profile.html">Profile</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="details-card">
      <div class="details-header">
        <h1 id="title"></h1>
        <span id="status" class="status-badge"></span>
      </div>

      <div class="life-container">
        <div id="progressBar"></div>
      </div>
      <p id="progressText"></p>

      <div class="details-grid">
        <div class="info-box">
          <h3>Informations</h3>
          <p><strong>Zone:</strong> <span id="desc"></span></p>
          <p><strong>Date:</strong> <span id="date"></span></p>
          <p><strong>Niveau:</strong> <span id="severity"></span></p>
        </div>

        <div class="info-box">
          <h3>Coordonnées</h3>
          <p><strong>Latitude:</strong> <span id="lat"></span></p>
          <p><strong>Longitude:</strong> <span id="lng"></span></p>
        </div>

        <div class="info-box">
          <h3>Impact</h3>
          <p><strong>Victimes:</strong> <span id="victims"></span></p>
          <p><strong>Blessés:</strong> <span id="injured"></span></p>
          <p><strong>Dégâts:</strong> <span id="damage"></span></p>
        </div>
      </div>

      <div class="tracking-box">
        <div class="timeline">
          <div class="step" id="step-start">Début</div>
          <div class="step" id="step-current">En cours</div>
          <div class="step" id="step-end">Terminée</div>
        </div>
      </div>

      <div id="detail-map" style="height:300px; width:100%; border:1px solid #d1d6e6;"></div>

      <div class="actions">
        <a href="index.html" class="btn">Retour</a>
      </div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="js/app.js"></script>
  <script src="js/details.js"></script>

</body>
</html>
