<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="navbar">
    <div class="container navbar-inner">
      <a class="logo" href="#" aria-label="Accueil SafeHaven">
        <span class="logo-mark">S</span>
        <span class="logo-text">
          <strong>SafeHaven</strong>
          <small>Protection et réponse</small>
        </span>
      </a>

      <button class="menu-btn" type="button">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="nav">
        <a class="nav-link active" href="#">Accueil</a>
        <a class="nav-link" href="#">Signalements</a>
        <a class="nav-link" href="#">Contact</a>
        <a class="nav-secondary" href="#">Se connecter</a>
        <a class="nav-primary" href="#">Ajouter un signalement</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="auth">
      <div class="auth-box">
        <h2>Créer un compte</h2>

        
        <form  method="POST">
          <p id="message"></p>
          <div class="field">
            <label>Nom</label>
            <input type="text" name="nom" required>
          </div>

          <div class="field">
            <label>Email</label>
            <input type="email" name="email" required>
          </div>

          <div class="field">
            <label>Téléphone</label>
            <input type="tel" name="telephone" pattern="[0-9]{10}" placeholder="0612345678" required>
          </div>

          <div class="field">
            <label>Mot de passe</label>
            <input type="password" name="password" required>
          </div>

          <button class="form-submit" type="submit">S'inscrire</button>
        </form>

        <p class="auth-link">
          Déjà un compte ? <a href="login.html">Se connecter</a>
        </p>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <h2>SafeHaven</h2>
        <p>Un espace simple pour suivre les catastrophes.</p>
      </div>

      <div class="footer-links">
        <h3>Liens rapides</h3>
        <a href="index.html">Accueil</a>
        <a href="#">Services</a>
      </div>

      <div class="footer-contact">
        <h3>Contact</h3>
        <p>contact@safehaven.ma</p>
      </div>
    </div>

    <div class="container footer-bottom">
      <span>2026 SafeHaven</span>
    </div>
  </footer>

  <script src="js/app.js"></script>

</body>
</html>
